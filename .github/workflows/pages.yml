name: Deploy Jekyll to Pages

  on:
    push:
      branches: [main]        # keep deploying on every push (change if your default branch isn't
  "main")
    schedule:
      - cron: '0 16 * * *'    # 16:00 UTC = 01:00 JST — publishes tips dated that day
    workflow_dispatch:        # adds a manual "Run workflow" button

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: pages
    cancel-in-progress: false

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/configure-pages@v5
        - uses: actions/jekyll-build-pages@v1
        - uses: actions/upload-pages-artifact@v3
    deploy:
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        - id: deployment
          uses: actions/deploy-pages@v4
