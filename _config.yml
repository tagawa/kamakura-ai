# Site settings
title: 鎌倉AI
title_en: Kamakura AI
description: 鎌倉発、仕事と暮らしで今日から試せる実践AIヒント集。地元のAI交流イベントも開催しています。
url: "https://kamakura.ai"
timezone: Asia/Tokyo
lang: ja

collections:
  tips:
    output: true
    permalink: /tips/:name/

defaults:
  - scope:
      path: ""
      type: "tips"
    values:
      layout: tip

exclude:
  - README.md
  - LICENSE
  - CNAME
  - .gitignore

plugins:
  - jekyll-sitemap
